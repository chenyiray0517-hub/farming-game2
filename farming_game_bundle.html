<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>種田遊戲</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-bg: #3d7a52;
  --brown-dark: #5c3010;
  --brown-mid: #8b5e3c;
  --plot-base: #c4a46a;
  --plot-shadow: #9a7a4a;
  --gold: #f5a623;
  --gold-dark: #d4891a;
  --panel-bg: #ffffff;
  --green-accent: #4caf50;
  --green-dark: #2d5a3d;
}

body {
  font-family: 'Segoe UI', '微軟正黑體', 'PingFang TC', sans-serif;
  background: var(--green-bg);
  height: 100vh;
  overflow: hidden;
  color: #2c3e50;
}

/* Hide real cursor when a tool mode is active */
body.watering-mode,
body.watering-mode * { cursor: none !important; }
body.harvest-mode,
body.harvest-mode  * { cursor: none !important; }

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Top Bar ── */
#topbar {
  background: rgba(0,0,0,0.35);
  color: #fff;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  min-height: 72px;
}

.tb-left {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 190px;
}

.tb-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.tb-right {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 230px;
  justify-content: flex-end;
}

#day-label { font-size: 17px; font-weight: 700; }
#money-display { font-size: 17px; font-weight: 700; color: var(--gold); }

#level-display { font-size: 15px; font-weight: 600; }

#xp-wrap {
  width: 220px;
  height: 9px;
  background: rgba(255,255,255,0.25);
  border-radius: 5px;
  overflow: hidden;
}

#xp-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--gold), #ffe066);
  border-radius: 5px;
  transition: width 0.5s ease;
}

#xp-label { font-size: 11px; opacity: 0.75; }

.badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
}
.badge.spring  { background: #f9a8d4; color: #831843; }
.badge.summer  { background: #fde68a; color: #92400e; }
.badge.autumn  { background: #fed7aa; color: #9a3412; }
.badge.winter  { background: #bae6fd; color: #1e40af; }
.badge.weather { background: rgba(255,255,255,0.2); color: #fff; }

#companions { font-size: 20px; letter-spacing: 2px; }

#mute-btn {
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 15px;
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}
#mute-btn:hover { background: rgba(255,255,255,0.28); }

/* ── Main Layout ── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  padding: 12px 14px 10px;
  gap: 14px;
}

/* ── Farm ── */
#farm-wrapper {
  background: var(--brown-dark);
  border-radius: 14px;
  padding: 14px;
  border: 4px solid var(--brown-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

#farm-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 7px;
}

.plot {
  width: 76px;
  height: 76px;
  background: var(--plot-base);
  border-radius: 9px;
  border: 3px solid var(--plot-shadow);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  position: relative;
  transition: transform 0.12s, filter 0.15s;
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,0.18),
    inset 0 -3px 0 rgba(0,0,0,0.18);
  user-select: none;
}

.plot:hover { transform: translateY(-3px) scale(1.04); filter: brightness(1.08); }

/* small dark inset square for empty plots */
.plot.empty::after {
  content: '';
  width: 22px;
  height: 22px;
  background: rgba(90, 55, 10, 0.38);
  border-radius: 5px;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.25);
}

.plot.growing         { background: #5a9e4a; } /* 綠：未澆水 */
.plot.growing.watered { background: #4a88c4; } /* 藍：已澆水 */

.plot.ready {
  border-color: var(--gold);
  animation: plot-pulse 1.1s ease-in-out infinite;
}

/* withered (no water for a day) */
.plot.withered {
  background: #888 !important;
  border-color: #555 !important;
  animation: none !important;
  filter: grayscale(0.7);
}


@keyframes plot-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,166,35,0.55), inset 0 3px 0 rgba(255,255,255,0.18), inset 0 -3px 0 rgba(0,0,0,0.18); }
  50%       { box-shadow: 0 0 0 7px rgba(245,166,35,0),   inset 0 3px 0 rgba(255,255,255,0.18), inset 0 -3px 0 rgba(0,0,0,0.18); }
}

.days-tag {
  position: absolute;
  bottom: 4px;
  right: 5px;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  background: rgba(0,0,0,0.35);
  padding: 1px 5px;
  border-radius: 6px;
  pointer-events: none;
}

/* ── Right Panel ── */
#panel {
  width: 258px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--panel-bg);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

#tab-nav {
  display: flex;
  background: #ececec;
}

.tab-btn {
  flex: 1;
  padding: 9px 2px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  color: #777;
  border-bottom: 3px solid transparent;
  transition: all 0.18s;
}

.tab-btn:hover { background: rgba(0,0,0,0.06); color: #333; }

.tab-btn.active {
  background: #fff;
  color: var(--green-dark);
  border-bottom-color: var(--green-accent);
}

.end-btn {
  background: #e8622a !important;
  color: #fff !important;
  border-radius: 0 10px 0 0;
}
.end-btn:hover { background: #cf531e !important; }

#panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  scrollbar-width: thin;
}

/* ── Shop ── */
.shop-hint {
  text-align: center;
  font-size: 12px;
  color: #888;
  background: #f4f4f4;
  border-radius: 7px;
  padding: 7px;
  margin-bottom: 10px;
}

.section-title {
  text-align: center;
  font-size: 11px;
  color: #bbb;
  margin: 8px 0;
  position: relative;
}
.section-title::before, .section-title::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 28%;
  height: 1px;
  background: #e0e0e0;
}
.section-title::before { left: 0; }
.section-title::after  { right: 0; }

.seed-card {
  display: flex;
  align-items: center;
  padding: 9px 11px;
  border-radius: 10px;
  margin-bottom: 7px;
  border: 2px solid transparent;
  background: #f7f7f7;
  cursor: pointer;
  transition: all 0.18s;
}
.seed-card:hover:not(.locked) { background: #eef7ee; border-color: #a5d6a7; }
.seed-card.selected { background: #e3f5e3; border-color: var(--green-dark); }
.seed-card.locked { opacity: 0.5; cursor: not-allowed; }

/* Rarity left-border */
.seed-card.rarity-common    { border-left: 4px solid #bdbdbd; }
.seed-card.rarity-good      { border-left: 4px solid #66bb6a; }
.seed-card.rarity-premium   { border-left: 4px solid #42a5f5; }
.seed-card.rarity-legendary { border-left: 4px solid #ab47bc; }
.seed-card.rarity-mythical  { border-left: 4px solid #ff7043; }

.rarity-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 800;
  padding: 1px 5px;
  border-radius: 4px;
  vertical-align: middle;
  margin-left: 4px;
  letter-spacing: 0.3px;
}

.rarity-section-title {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1px;
  margin: 10px 0 5px;
  padding: 3px 8px;
  border-left: 3px solid;
  border-radius: 0 4px 4px 0;
  background: rgba(0,0,0,0.03);
}

.seed-emoji { font-size: 28px; flex-shrink: 0; }
.seed-info  { flex: 1; margin-left: 9px; }
.seed-name  { font-weight: 700; font-size: 14px; }
.seed-days  { font-size: 11px; color: #999; }

.seed-prices { display: flex; flex-direction: column; align-items: flex-end; font-size: 12px; gap: 1px; }
.seed-cost { color: #e53935; font-weight: 600; }
.seed-sell { color: #43a047; font-weight: 600; }
.lock-label { font-size: 10px; color: #aaa; }

.seed-season           { font-size: 10px; margin-top: 2px; font-weight: 600; }
.seed-season.in-season  { color: #388e3c; }
.seed-season.out-season { color: #e65100; }

/* ── Warehouse ── */
.empty-msg { text-align: center; color: #bbb; padding: 36px 12px; font-size: 13px; line-height: 1.7; }

.inv-item {
  display: flex;
  align-items: center;
  background: #f7f7f7;
  border-radius: 9px;
  padding: 8px 10px;
  margin-bottom: 7px;
}
.inv-emoji { font-size: 26px; flex-shrink: 0; }
.inv-info  { flex: 1; margin-left: 9px; }
.inv-name  { font-weight: 700; font-size: 13px; }
.inv-sub   { font-size: 11px; color: #999; }

.sell-btn {
  padding: 5px 11px;
  background: #43a047;
  color: #fff;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
}
.sell-btn:hover { background: #388e3c; }

.sell-all-btn {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: linear-gradient(135deg, var(--gold), #e09300);
  color: #fff;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  font-weight: 700;
  font-size: 13px;
}
.sell-all-btn:hover { filter: brightness(1.08); }

/* ── Tasks ── */
.task-section-title {
  font-weight: 700;
  font-size: 13px;
  margin: 0 0 8px;
  color: #444;
}

.task-card {
  padding: 10px 12px;
  background: #f7f7f7;
  border-radius: 9px;
  margin-bottom: 8px;
  border-left: 4px solid #ddd;
}
.task-card.in-progress { border-left-color: var(--gold); }
.task-card.done        { border-left-color: #43a047; opacity: 0.65; }

.task-title    { font-weight: 700; font-size: 13px; }
.task-prog-txt { font-size: 11px; color: #888; margin-top: 2px; }

.task-prog-bar {
  height: 5px;
  background: #e0e0e0;
  border-radius: 3px;
  margin: 5px 0 4px;
  overflow: hidden;
}
.task-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #ffe066);
  border-radius: 3px;
  transition: width 0.35s;
}

.task-reward { font-size: 11px; color: var(--gold-dark); }

/* ── Bottom Bar ── */
#bottom-bar {
  flex-shrink: 0;
  height: 58px;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 0 20px;
}

.bbar-sep {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,0.2);
}

.bbar-label {
  color: rgba(255,255,255,0.6);
  font-size: 13px;
}

.bbar-btn {
  padding: 8px 20px;
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 22px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
}
.bbar-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }

.bbar-btn.active {
  background: rgba(255,255,255,0.9);
  color: #2c3e50;
  border-color: #fff;
}

/* ── Buff Strip ── */
#buff-strip {
  background: rgba(245,166,35,0.18);
  border-bottom: 1px solid rgba(245,166,35,0.3);
  padding: 4px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  flex-shrink: 0;
  min-height: 0;
}
#buff-strip:empty { display: none; padding: 0; }

.buff-chip {
  padding: 2px 10px;
  background: rgba(245,166,35,0.35);
  border: 1px solid rgba(245,166,35,0.6);
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
}

/* ── Pet Button ── */
#pet-btn {
  position: fixed;
  bottom: 72px;
  right: 18px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: var(--green-accent);
  border: 3px solid rgba(255,255,255,0.4);
  color: white;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  transition: transform 0.15s;
  z-index: 50;
}
#pet-btn:hover { transform: scale(1.12); }

/* ── Pet Screen ── */
#pet-screen {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
}
#pet-screen[hidden] { display: none !important; }

#pet-hdr {
  background: rgba(0,0,0,0.28);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  color: #fff;
  flex-shrink: 0;
}
#pet-back-btn {
  padding: 7px 16px;
  background: rgba(255,255,255,0.2);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 20px;
  color: #fff;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
}
#pet-back-btn:hover { background: rgba(255,255,255,0.35); }

.pet-hdr-center { flex: 1; text-align: center; }
.pet-hdr-title  { font-size: 18px; font-weight: 700; display: block; }
.pet-hdr-sub    { font-size: 12px; opacity: 0.8; }
.pet-hdr-right  { min-width: 80px; text-align: right; font-size: 13px; opacity: 0.8; }

#pet-meadow {
  flex: 1;
  background: linear-gradient(to bottom,
    #5bc8f5 0%,
    #8ed4f7 28%,
    #b8e87a 55%,
    #5ab832 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 20px;
}

#pet-clouds {
  position: absolute;
  top: 14px;
  width: 90%;
  display: flex;
  justify-content: space-around;
  font-size: 38px;
  opacity: 0.85;
  pointer-events: none;
}
.cloud { display: inline-block; animation: cloud-drift 9s ease-in-out infinite; }
.cloud:nth-child(2) { animation-delay: -3.5s; animation-duration: 11s; }
.cloud:nth-child(3) { animation-delay: -6s;   animation-duration: 8s;  }
@keyframes cloud-drift {
  0%, 100% { transform: translateX(0px); }
  50%       { transform: translateX(14px); }
}

#pet-list {
  display: flex;
  gap: 28px;
  align-items: flex-end;
  justify-content: center;
  flex-wrap: wrap;
  z-index: 1;
}

.pet-card {
  background: rgba(255,255,255,0.88);
  border-radius: 22px;
  padding: 22px 26px;
  text-align: center;
  min-width: 190px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  backdrop-filter: blur(6px);
  transition: transform 0.2s;
  border: 3px solid transparent;
}
.pet-card:hover     { transform: translateY(-8px); }
.pet-card.feeding   { border-color: var(--gold); }
.pet-card.fed-done  { opacity: 0.72; }

.pet-card:not(.feeding).grade-common    { border-color: #bdbdbd; }
.pet-card:not(.feeding).grade-good      { border-color: #66bb6a; }
.pet-card:not(.feeding).grade-premium   { border-color: #42a5f5; }
.pet-card:not(.feeding).grade-legendary { border-color: #ab47bc; }
.pet-card:not(.feeding).grade-mythical  { border-color: #ff7043; }

.owned-pet-card.grade-common    { border-color: #bdbdbd; }
.owned-pet-card.grade-good      { border-color: #66bb6a; }
.owned-pet-card.grade-premium   { border-color: #42a5f5; }
.owned-pet-card.grade-legendary { border-color: #ab47bc; }
.owned-pet-card.grade-mythical  { border-color: #ff7043; }

.pet-grade-badge {
  display: inline-block;
  margin-bottom: 6px;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 10px;
}

.pet-emoji-big { font-size: 62px; display: block; line-height: 1.1; margin-bottom: 6px; }
.pet-name      { font-size: 17px; font-weight: 700; margin-bottom: 3px; color: #2c3e50; }
.pet-fav-food  { font-size: 12px; color: #999; margin-bottom: 4px; }

.pet-buff-tag {
  display: inline-block;
  padding: 3px 10px;
  background: #f0f0f0;
  border: 1.5px solid #ddd;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  color: #888;
  margin-bottom: 6px;
}
.pet-buff-tag.active {
  background: rgba(245,166,35,0.18);
  border-color: var(--gold);
  color: var(--gold-dark);
}
.pet-buff2-tag {
  background: #eef4ff;
  border-color: #90bef5;
  color: #1565c0;
}
.pet-buff2-tag.active {
  background: rgba(21,101,192,0.12);
  border-color: #42a5f5;
  color: #1565c0;
}
.pet-stat-buff2 { color: #1565c0; }
.pet-mood      { font-size: 26px; display: block; margin-bottom: 12px; }

.pet-feed-btn {
  padding: 8px 22px;
  background: linear-gradient(135deg, #4caf50, #2e7d32);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  transition: filter 0.15s;
}
.pet-feed-btn:hover { filter: brightness(1.12); }
.pet-fed-label { font-size: 14px; color: #43a047; font-weight: 700; }

/* Feeding food-select inside pet card */
.food-select-title {
  font-size: 12px;
  color: #666;
  margin-bottom: 8px;
}
.food-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-bottom: 8px;
  max-width: 220px;
}
.food-chip {
  padding: 5px 10px;
  background: #f4f4f4;
  border: 2px solid transparent;
  border-radius: 14px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.14s;
}
.food-chip:hover     { background: #e8f5e9; border-color: #4caf50; }
.food-chip.fav-chip  { background: #fff8e1; border-color: #ffb300; color: #e65100; }
.food-chip.fav-chip:hover { background: #ffecb3; }

.food-cancel-btn {
  padding: 5px 14px;
  background: transparent;
  border: 2px solid #ddd;
  border-radius: 14px;
  cursor: pointer;
  font-size: 12px;
  color: #999;
  transition: all 0.14s;
}
.food-cancel-btn:hover { border-color: #bbb; color: #666; }
.no-food-msg { font-size: 12px; color: #bbb; padding: 8px 0; line-height: 1.6; }

#pet-ground-deco {
  position: absolute;
  bottom: 0;
  width: 100%;
  font-size: 22px;
  letter-spacing: 2px;
  text-align: center;
  padding: 6px 0;
  background: rgba(50,110,30,0.25);
  pointer-events: none;
}

/* ── Custom cursor follower ── */
#cursor-follow {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 30px;
  line-height: 1;
  transform: translate(-30%, -70%);
  display: none;
  filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.4));
}

/* ── Toast ── */
#toast-box {
  position: fixed;
  top: 82px;
  right: 18px;
  z-index: 999;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.toast {
  background: rgba(20,20,20,0.88);
  color: #fff;
  padding: 10px 16px;
  border-radius: 9px;
  font-size: 13px;
  animation: toast-slide 0.28s ease;
  backdrop-filter: blur(4px);
}

@keyframes toast-slide {
  from { transform: translateX(110%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* ── Day overlay ── */
#day-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 600;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  animation: overlay-fade 1.2s ease forwards;
  pointer-events: none;
}
#day-overlay .day-big { font-size: 42px; font-weight: 900; }

  0%   { opacity: 0; }
  25%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── Pet view / upgrade ── */
.pet-view-btn {
  margin-top: 6px;
  padding: 6px 16px;
  background: rgba(76, 175, 80, 0.12);
  border: 2px solid #81c784;
  border-radius: 16px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: #2e7d32;
  transition: all 0.14s;
}
.pet-view-btn:hover { background: rgba(76, 175, 80, 0.25); border-color: #4caf50; }

.pet-stat-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  background: rgba(250, 248, 240, 0.95);
  border-radius: 14px;
  border: 1.5px solid rgba(245,166,35,0.4);
  margin-top: 4px;
  width: 100%;
}
.pet-stat-lv   { font-size: 17px; font-weight: 800; color: var(--gold-dark); }
.pet-stat-buff { font-size: 13px; font-weight: 600; color: #333; text-align: center; }
.pet-stat-cost { font-size: 11px; color: #999; }
.pet-stat-maxlv { font-size: 12px; color: var(--gold-dark); font-weight: 700; }

.pet-upgrade-btn {
  padding: 7px 20px;
  background: linear-gradient(135deg, var(--gold), #e09300);
  color: #fff;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  transition: filter 0.15s;
  box-shadow: 0 2px 8px rgba(212,137,26,0.35);
}
.pet-upgrade-btn:hover { filter: brightness(1.1); }

.pet-owned-badge {
  font-size: 12px;
  color: #388e3c;
  font-weight: 700;
  padding: 3px 10px;
  background: rgba(76,175,80,0.12);
  border-radius: 12px;
  border: 1.5px solid #81c784;
}

.pet-adopt-btn {
  padding: 6px 16px;
  background: linear-gradient(135deg, #66bb6a, #2e7d32);
  color: #fff;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  transition: filter 0.14s;
}
.pet-adopt-btn:hover { filter: brightness(1.1); }

/* ── Owned Pets Section ── */
#pet-owned {
  flex-shrink: 0;
  background: linear-gradient(180deg, #4a9b3a 0%, #3a7a2c 55%, #2e6122 100%);
  padding: 12px 24px 16px;
  border-top: 3px solid #6dbf56;
  max-height: 42vh;
  overflow-y: auto;
  box-shadow: inset 0 4px 12px rgba(0,0,0,0.18);
}

#pet-owned-header {
  color: #e8ffe0;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.35);
}

.owned-empty {
  color: rgba(220,255,200,0.6);
  font-size: 12px;
  font-style: italic;
  padding: 4px 0 6px;
}

#pet-owned-list {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

.owned-pet-card {
  background: rgba(255,255,255,0.88);
  border-radius: 14px;
  padding: 9px 13px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
  border: 2.5px solid transparent;
  min-width: 70px;
  backdrop-filter: blur(4px);
  user-select: none;
}
.owned-pet-card:hover   { transform: translateY(-3px); border-color: var(--gold); }
.owned-pet-card.viewing { border-color: var(--gold); background: #fff8e1; }

.owned-pet-emoji { font-size: 28px; display: block; line-height: 1.2; }
.owned-pet-name  { font-size: 11px; font-weight: 700; color: #333; margin-top: 2px; }
.owned-pet-lv    { font-size: 10px; color: var(--gold-dark); font-weight: 700; }

#pet-owned-detail { margin-top: 10px; }

.owned-detail-inner {
  background: rgba(255,255,255,0.93);
  border-radius: 14px;
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  border: 2px solid rgba(245,166,35,0.45);
}
.owned-detail-emoji  { font-size: 32px; line-height: 1; flex-shrink: 0; }
.owned-detail-info   { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.owned-detail-name   { font-size: 14px; font-weight: 700; color: #2c3e50; }
.owned-detail-lv     { font-size: 12px; font-weight: 700; color: var(--gold-dark); }
.owned-detail-buff   { font-size: 12px; color: #444; }
.owned-detail-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
}

.pet-release-btn {
  padding: 5px 13px;
  background: rgba(198, 40, 40, 0.07);
  border: 1.5px solid rgba(198, 40, 40, 0.35);
  border-radius: 14px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  color: #c62828;
  transition: all 0.14s;
}
.pet-release-btn:hover { background: rgba(198,40,40,0.15); border-color: rgba(198,40,40,0.7); }

/* ══ Plot state font sizes (replaces inline JS) ══ */
.plot.growing  { font-size: 22px; }
.plot.ready    { font-size: 32px; }
.plot.withered { font-size: 28px; }

/* ── Pet tab button in nav ── */
.pet-tab-btn { color: var(--green-dark) !important; }

/* ══ Responsive ══ */

/* Medium screens: scale cells, panel fills remaining right space */
@media (max-width: 900px) {
  .plot { width: 64px; height: 64px; }
  #farm-grid { gap: 6px; }
  #farm-wrapper { padding: 11px; }
  #panel { flex: 1; width: auto; }
}

@media (max-width: 720px) {
  /* Compact topbar */
  #topbar { padding: 5px 10px; min-height: 60px; gap: 8px; }
  .tb-left { min-width: 120px; gap: 8px; }
  .tb-right { min-width: 140px; gap: 5px; }
  #day-label, #money-display { font-size: 14px; }
  #level-display { font-size: 12px; }
  #xp-wrap { width: 130px; }
  #xp-label { display: none; }
  .badge { padding: 3px 7px; font-size: 11px; }

  /* Smaller farm cells */
  .plot { width: 52px; height: 52px; }
  .plot.growing  { font-size: 16px; }
  .plot.ready    { font-size: 24px; }
  .plot.withered { font-size: 20px; }
  .plot.empty::after { width: 15px; height: 15px; }
  #farm-grid { gap: 5px; }
  #farm-wrapper { padding: 8px; border-width: 3px; }
  .days-tag { font-size: 9px; padding: 1px 3px; }

  /* Panel fills remaining right space */
  #panel { flex: 1; width: auto; }

  /* 5 tab buttons: tighter */
  .tab-btn { font-size: 10px; padding: 8px 1px; }

  /* Pet button now lives in the tab nav */
  #pet-btn { display: none; }

  /* Compact bottom bar */
  #bottom-bar { height: 50px; gap: 8px; padding: 0 10px; }
  .bbar-btn { padding: 5px 12px; font-size: 12px; }
}

/* Small portrait phones: stack farm on top, panel below */
@media (max-width: 540px) {
  #main {
    flex-direction: column;
    padding: 6px 8px;
    gap: 6px;
    overflow-y: auto;
  }

  #farm-wrapper {
    width: 100%;
    padding: 8px;
    border-width: 3px;
    flex-shrink: 0;
  }

  #farm-grid {
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
    width: 100%;
  }

  .plot {
    width: auto;
    height: auto;
    aspect-ratio: 1;
  }
  .plot.growing  { font-size: 16px; }
  .plot.ready    { font-size: 22px; }
  .plot.withered { font-size: 18px; }
  .plot.empty::after { width: 12px; height: 12px; }

  #panel {
    flex: 1;
    width: 100%;
    max-width: none;
    min-height: 180px;
  }

  .tab-btn { font-size: 9px; padding: 7px 1px; }
}

</style>

let sfxMuted = localStorage.getItem('farm_sfx_muted') === '1';

const SFX = (() => {
  let ctx = null;

  function ac() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (_) { return null; }
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function note(freq, dur, vol = 0.22, type = 'sine', delay = 0) {
    if (sfxMuted) return;
    const c = ac(); if (!c) return;
    const t = c.currentTime + delay;
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g); g.connect(c.destination);
    osc.start(t); osc.stop(t + dur + 0.02);
  }

  function sweep(f1, f2, dur, vol = 0.18, type = 'sine', delay = 0) {
    if (sfxMuted) return;
    const c = ac(); if (!c) return;
    const t = c.currentTime + delay;
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f1, t);
    osc.frequency.exponentialRampToValueAtTime(f2, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g); g.connect(c.destination);
    osc.start(t); osc.stop(t + dur + 0.02);
  }

  return {
    plant()    { note(220, 0.1, 0.2, 'triangle'); note(330, 0.08, 0.12, 'triangle', 0.05); },
    water()    { sweep(700, 250, 0.28, 0.15); sweep(500, 180, 0.22, 0.1, 'sine', 0.07); },
    harvest()  { note(523, 0.2, 0.22); note(659, 0.2, 0.2, 'sine', 0.08); note(784, 0.35, 0.25, 'sine', 0.16); },
    sell()     { [523, 659, 784].forEach((f, i) => note(f, 0.12, 0.2, 'triangle', i * 0.055)); },
    levelUp()  { [523, 659, 784, 1047].forEach((f, i) => note(f, 0.35, 0.28, 'sine', i * 0.1)); },
    taskDone() { note(784, 0.15, 0.22, 'sine'); note(1047, 0.3, 0.28, 'sine', 0.12); },
    endDay()   { note(349, 0.7, 0.22, 'sine'); note(440, 0.5, 0.18, 'sine', 0.22); },
    feedPet()  { note(880, 0.1, 0.18, 'sine'); note(1100, 0.15, 0.2, 'sine', 0.08); },
    adopt()    { [659, 784, 1047, 1319].forEach((f, i) => note(f, 0.3, 0.22, 'sine', i * 0.08)); },
    error()    { note(130, 0.25, 0.22, 'square'); },
    wither()   { sweep(280, 130, 0.45, 0.18, 'sawtooth'); },
  };
})();

function save() {
  try { localStorage.setItem('farmGame_v2', JSON.stringify(G)); } catch(_) {}
}

function load() {
  try {
    const raw = localStorage.getItem('farmGame_v2');
    if (raw) {
      G = Object.assign(DEFAULT_STATE(), JSON.parse(raw));
      G.grid.forEach(p => {
        if (p.watered  === undefined) p.watered  = false;
        if (p.dryDays  === undefined) p.dryDays  = 0;
      });
    }
  } catch(_) { G = DEFAULT_STATE(); }
  G.feedingPetIdx  = -1; // always reset transient state
  G.viewingPetIdx  = -1;
  G.viewingOwnedId = null;
  if (!G.dailyPets || G.dailyPets.length === 0) generateDailyPets();
  else reapplyBuffs(); // ensure owned pet buffs are active on save-load
}

const follower = document.getElementById('cursor-follow');

document.addEventListener('mousemove', e => {
  if (G.mode === 'normal') return;
  follower.style.left = e.clientX + 'px';
  follower.style.top  = e.clientY + 'px';
});

function setMode(newMode) {
  G.mode = (G.mode === newMode) ? 'normal' : newMode;
  updateCursor();
  renderBottomBar();
  save();
}

function updateCursor() {
  document.body.classList.toggle('watering-mode', G.mode === 'watering');
  document.body.classList.toggle('harvest-mode',  G.mode === 'harvest');

  if (G.mode === 'watering') {
    follower.textContent = '🪣';
    follower.style.display = 'block';
  } else if (G.mode === 'harvest') {
    follower.textContent = '🌾';
    follower.style.display = 'block';
  } else {
    follower.style.display = 'none';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && G.mode !== 'normal') {
    G.mode = 'normal';
    updateCursor();
    renderBottomBar();
    save();
  }
});

function renderTopBar() {
  document.getElementById('day-num').textContent   = G.day;
  document.getElementById('money-num').textContent = G.money;
  document.getElementById('lv-num').textContent    = G.level;
  document.getElementById('lv-title').textContent  = LEVEL_TITLES[Math.min(G.level, LEVEL_TITLES.length - 1)];

  document.getElementById('weather-badge').textContent = w.icon + ' ' + w.name;

function plotEmoji(plot) {
  if (plot.state !== 'growing') return '';
  const progress = 1 - plot.daysLeft / plot.totalDays;
  if (progress < 0.35) return '🌱';
  if (progress < 0.75) return '🌿';
  return CROPS[plot.cropId].emoji;
}

function renderGrid() {
  const grid = document.getElementById('farm-grid');
  grid.innerHTML = '';

  G.grid.forEach((plot, idx) => {
    const cell = document.createElement('div');
    cell.className = 'plot ' + plot.state + (plot.state === 'growing' && plot.watered ? ' watered' : '');
    cell.dataset.idx = idx;

    if (plot.state === 'growing') {
      cell.textContent = plotEmoji(plot);

      const dTag = document.createElement('span');
      dTag.className = 'days-tag';
      dTag.textContent = plot.daysLeft + '天';
      cell.appendChild(dTag);

    } else if (plot.state === 'ready') {
      cell.textContent = CROPS[plot.cropId].emoji;

    } else if (plot.state === 'withered') {
      cell.textContent = '🥀';
      cell.title = '點擊清除枯死的植物';
    }

    grid.appendChild(cell);
  });
}

function renderPanel() {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === G.activeTab);
  });
  const body = document.getElementById('panel-body');
  if      (G.activeTab === 'shop')      renderShop(body);
  else if (G.activeTab === 'warehouse') renderWarehouse(body);
  else if (G.activeTab === 'tasks')     renderTasks(body);
}

function renderBottomBar() {
  document.getElementById('water-btn').classList.toggle('active', G.mode === 'watering');
  document.getElementById('harvest-single-btn').classList.toggle('active', G.mode === 'harvest');

// ── Shop ──────────────────────────────────

function renderShop(el) {
  let html = '<div class="shop-hint">選好種子後，長按拖曳農地批量種植<br>非當季種植每天有 25% 枯死率</div>';

  ['common', 'good', 'premium', 'legendary', 'mythical'].forEach(rarityKey => {
    const crops = Object.values(CROPS).filter(c => c.rarity === rarityKey);
    if (!crops.length) return;

    const r = RARITIES[rarityKey];
    html += `<div class="rarity-section-title" style="color:${r.color};border-color:${r.borderColor}">${r.name}</div>`;

    crops.forEach(crop => {
      const locked      = G.level < crop.minLevel;
      const selected    = G.selectedSeed === crop.id;
      const inSeason    = crop.seasons.includes(G.season);
      const seasonIcons = crop.seasons.map(s => SEASON_ICONS[s]).join('');
      const cls = `seed-card rarity-${rarityKey}${locked ? ' locked' : ''}${selected ? ' selected' : ''}`;

      html += `
        <div class="${cls}" data-crop="${crop.id}">
          <span class="seed-emoji">${crop.emoji}</span>
          <div class="seed-info">
            <div class="seed-name">
              ${crop.name}
              <span class="rarity-badge" style="color:${r.badgeColor};background:${r.badgeBg}">${r.name}</span>
            </div>
            <div class="seed-days">${crop.days}天</div>
            <div class="seed-season ${inSeason ? 'in-season' : 'out-season'}">${seasonIcons} ${inSeason ? '當季' : '非當季⚠'}</div>
          </div>
          <div class="seed-prices">
            ${locked
              ? `<span class="lock-label">🔒 Lv.${crop.minLevel}</span>`
              : `<span class="seed-cost">-${crop.cost} 💰</span><span class="seed-sell">+${crop.sell} 💰</span>`}
          </div>
        </div>`;
    });
  });

  el.innerHTML = html;

  el.querySelectorAll('.seed-card:not(.locked)').forEach(card => {
    card.addEventListener('click', () => {
      G.selectedSeed = G.selectedSeed === card.dataset.crop ? null : card.dataset.crop;
      renderPanel();
    });
  });
}

// ── Warehouse ─────────────────────────────

function renderWarehouse(el) {
  const items = Object.entries(G.inventory);
  if (!items.length) {
    el.innerHTML = '<div class="empty-msg">倉庫是空的<br/>收穫作物後在這裡出售</div>';
    return;
  }

  let total = 0;
  let html  = '';

  items.forEach(([id, count]) => {
    const crop = CROPS[id];
    const val  = crop.sell * count;
    total += val;
    html += `
      <div class="inv-item">
        <span class="inv-emoji">${crop.emoji}</span>
        <div class="inv-info">
          <div class="inv-name">${crop.name}</div>
          <div class="inv-sub">x${count} &nbsp;(共 ${val} 💰)</div>
        </div>
        <button class="sell-btn" data-crop="${id}">出售</button>
      </div>`;
  });

  html += `<button class="sell-all-btn">全部出售 (+${total} 💰)</button>`;
  el.innerHTML = html;

  el.querySelectorAll('.sell-btn').forEach(b => b.addEventListener('click', () => sellCrop(b.dataset.crop)));
  el.querySelector('.sell-all-btn').addEventListener('click', sellAll);
}

// ── Tasks ─────────────────────────────────

function renderTasks(el) {
  function taskHTML(tasks, doneMap) {
    return tasks.map(t => {
      const cur  = Math.min(taskStatValue(t.key), t.target);
      const done = !!doneMap[t.id];
      const pct  = Math.min((cur / t.target) * 100, 100);
      const cls  = done ? 'done' : (cur > 0 ? 'in-progress' : '');
      const rwd  = [t.reward.xp ? t.reward.xp + ' XP' : '', t.reward.money ? '+' + t.reward.money + ' 💰' : ''].filter(Boolean).join('  ');

      return `
        <div class="task-card ${cls}">
          <div class="task-title">${done ? '✅ ' : ''}${t.title}</div>
          <div class="task-prog-txt">${cur} / ${t.target}</div>
          <div class="task-prog-bar"><div class="task-prog-fill" style="width:${pct}%"></div></div>
          <div class="task-reward">獎勵: ${rwd}</div>
        </div>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="task-section-title">📅 今日任務</div>
    ${taskHTML(makeDailyTasks(), G.dailyTasksDone)}
    <div class="task-section-title" style="margin-top:14px">🏆 成就</div>
    ${taskHTML(makeAchievements(), G.achievementsDone)}`;
}

function taskStatValue(key) {
  return { harvestedToday: G.harvestedToday, earnedToday: G.earnedToday, boughtToday: G.boughtToday, totalHarvested: G.totalHarvested, totalEarned: G.totalEarned, level: G.level }[key] ?? 0;
}

// ══════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════

function plantSeed(idx) {
  if (!G.selectedSeed) { showToast('請先在商店選擇種子'); return; }
  const plot = G.grid[idx];
  if (plot.state !== 'empty') return;

  const crop = CROPS[G.selectedSeed];
  const cost = Math.max(1, Math.round(crop.cost * (1 - G.activeBuffs.shopDiscount)));
  if (G.money < cost) { SFX.error(); showToast('💰 金幣不足！'); return; }

  SFX.plant();
  G.money -= cost;
  G.boughtToday++;

  plot.state     = 'growing';
  plot.cropId    = G.selectedSeed;
  plot.daysLeft  = crop.days;
  plot.totalDays = crop.days;
  plot.watered   = true; // freshly planted = already watered today
  plot.dryDays   = 0;

  checkTasks();
  save();
  renderAll();
}

function harvestPlot(idx) {
  const plot = G.grid[idx];
  if (plot.state !== 'ready') return;

  SFX.harvest();
  const crop = CROPS[plot.cropId];
  G.inventory[plot.cropId] = (G.inventory[plot.cropId] || 0) + 1;
  G.harvestedToday++;
  G.totalHarvested++;

  gainXP(crop.xp);

  Object.assign(plot, makePlot());

  showToast(`收穫 ${crop.emoji} ${crop.name}！ +${crop.xp} XP`);
  checkTasks();
  save();
  renderAll();
}

function harvestAll() {
  let count = 0;
  G.grid.forEach((plot, idx) => {
    if (plot.state !== 'ready') return;
    const crop = CROPS[plot.cropId];
    G.inventory[plot.cropId] = (G.inventory[plot.cropId] || 0) + 1;
    G.harvestedToday++;
    G.totalHarvested++;
    gainXP(crop.xp);
    Object.assign(plot, makePlot());
    count++;
  });

  if (count === 0) { showToast('目前沒有可收穫的作物'); return; }
  SFX.harvest();
  showToast(`🌾 全部收穫！共收穫 ${count} 個作物`);
  checkTasks();
  save();
  renderAll();
}

function waterPlot(idx) {
  const plot = G.grid[idx];
  if (plot.state !== 'growing' || plot.watered) return;
  SFX.water();
  plot.watered = true;
  save();
  renderGrid(); // lightweight re-render
}

function clearWithered(idx) {
  const plot = G.grid[idx];
  if (plot.state !== 'withered') return;
  Object.assign(plot, makePlot());
  save();
  renderGrid();
}

function sellCrop(cropId) {
  const count = G.inventory[cropId] || 0;
  if (!count) return;
  const crop   = CROPS[cropId];
  const earned = Math.round(crop.sell * count * (1 + G.activeBuffs.sellBonus));

  G.money       += earned;
  G.earnedToday += earned;
  G.totalEarned += earned;
  delete G.inventory[cropId];

  SFX.sell();
  showToast(`出售 ${crop.emoji} ×${count}，獲得 +${earned} 💰`);
  checkTasks();
  save();
  renderAll();
}

function sellAll() {
  let total = 0;
  Object.entries(G.inventory).forEach(([id, count]) => {
    total += Math.round(CROPS[id].sell * count * (1 + G.activeBuffs.sellBonus));
  });
  if (!total) return;

  G.money       += total;
  G.earnedToday += total;
  G.totalEarned += total;
  G.inventory    = {};

  SFX.sell();
  showToast(`全部出售！獲得 +${total} 💰`);
  checkTasks();
  save();
  renderAll();
}

function gainXP(amount) {
  if (amount <= 0) return;
  amount = Math.round(amount * (1 + G.activeBuffs.xpBonus));
  G.xp += amount;
  while (G.xp >= xpNeeded(G.level)) {
    G.xp -= xpNeeded(G.level);
    G.level++;
    SFX.levelUp();
    const title = LEVEL_TITLES[Math.min(G.level, LEVEL_TITLES.length - 1)];
    showToast(`🎉 升級！現在是 Lv.${G.level} ${title}`, 3000);
    checkTasks();
  }
}

// ── Task checks ───────────────────────────

function checkTasks() {
  makeDailyTasks().forEach(t => {
    if (G.dailyTasksDone[t.id]) return;
    if (taskStatValue(t.key) >= t.target) {
      G.dailyTasksDone[t.id] = true;
      G.money += t.reward.money;
      gainXP(t.reward.xp);
      SFX.taskDone();
      showToast(`📅 任務完成：${t.title}！`, 3000);
    }
  });
  makeAchievements().forEach(t => {
    if (G.achievementsDone[t.id]) return;
    if (taskStatValue(t.key) >= t.target) {
      G.achievementsDone[t.id] = true;
      G.money += t.reward.money;
      gainXP(t.reward.xp);
      SFX.taskDone();
      showToast(`🏆 成就解鎖：${t.title}！`, 3500);
    }
  });
}

// ── End Day ───────────────────────────────

function endDay() {
  const rainDay = WEATHERS[G.weather].bonus > 0;

  // Wither or grow all crops
  let witheredCount = 0;
  let outOfSeasonCount = 0;
  G.grid.forEach(plot => {
    if (plot.state !== 'growing') return;

    const isDry = !plot.watered && !rainDay;
    if (isDry) {
      if (G.activeBuffs.noWither && plot.dryDays === 0) {
        // Grace day: first day without water, survive but mark the streak
        plot.dryDays = 1;
        plot.daysLeft -= 1 + WEATHERS[G.weather].bonus + G.activeBuffs.extraGrowth;
        plot.watered   = false;
        if (plot.daysLeft <= 0) {
          plot.daysLeft = 0;
          plot.state    = 'ready';
        } else {
          const crop = CROPS[plot.cropId];
          if (!crop.seasons.includes(G.season) && Math.random() < 0.25) {
            plot.state = 'withered';
            outOfSeasonCount++;
          }
        }
      } else {
        // No buff, or second consecutive dry day → wither
        plot.state   = 'withered';
        plot.dryDays = 0;
        witheredCount++;
      }
    } else {
      // Watered or rained → normal growth, reset dry streak
      plot.dryDays   = 0;
      plot.daysLeft -= 1 + WEATHERS[G.weather].bonus + G.activeBuffs.extraGrowth;
      plot.watered   = false;
      if (plot.daysLeft <= 0) {
        plot.daysLeft = 0;
        plot.state    = 'ready';
      } else {
        // Out-of-season: 25% daily death chance
        const crop = CROPS[plot.cropId];
        if (!crop.seasons.includes(G.season) && Math.random() < 0.25) {
          plot.state = 'withered';
          outOfSeasonCount++;
        }
      }
    }
  });

  if (witheredCount > 0) { SFX.wither(); showToast(`🥀 有 ${witheredCount} 株植物因缺水枯死了！`, 3500); }
  if (outOfSeasonCount > 0) { SFX.wither(); showToast(`🌡️ 有 ${outOfSeasonCount} 株植物因季節不適而枯死了！`, 3500); }

  // Advance day
  G.day++;
  G.harvestedToday = 0;
  G.earnedToday    = 0;
  G.boughtToday    = 0;
  G.dailyTasksDone = {};

  // Random weather
  const r = Math.random();
  let cum  = 0;
  for (let i = 0; i < WEATHER_WEIGHTS.length; i++) {
    cum += WEATHER_WEIGHTS[i];
    if (r < cum) { G.weather = i; break; }
  }

  // Season change
  const newSeason = Math.floor((G.day - 1) / SEASON_LENGTH) % 4;
  if (newSeason !== G.season) {
    G.season = newSeason;
    showToast(`${SEASON_ICONS[G.season]} 季節變換：${SEASONS[G.season]}！`, 3000);
  }

  // New pets for the new day
  generateDailyPets();

  // Day overlay
  SFX.endDay();
  const overlay = document.createElement('div');
  overlay.id = 'day-overlay';
  overlay.innerHTML = `<div class="day-big">第 ${G.day} 天</div><div class="day-sub">${SEASON_ICONS[G.season]}${SEASONS[G.season]}・${WEATHERS[G.weather].icon}${WEATHERS[G.weather].name}</div>`;
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 1200);

  if (rainDay) showToast('🌧️ 雨天！作物加速生長，且已自動澆水');

  checkTasks();
  save();
  renderAll();
}

function showToast(msg, ms = 2200) {
  const box   = document.getElementById('toast-box');
  const toast = document.createElement('div');
  toast.className   = 'toast';
  toast.textContent = msg;
  box.appendChild(toast);
  setTimeout(() => {
    toast.style.transition = 'opacity 0.35s';
    toast.style.opacity    = '0';
    setTimeout(() => toast.remove(), 360);
  }, ms);
}

// ── Pet helpers ───────────────────────────

function getPetLevel(petId) {
  return G.petLevels[petId] || 1;
}

function scaledBuffValue(buff, level) {
  if (buff.type === 'noWither') return buff.value;
  return buff.value * (1 + 0.3 * (level - 1));
}

function upgradeCost(level) {
  return level * 12000;
}

function formatBuffLabel(buff, value) {
  switch (buff.type) {
    case 'xpBonus':      return `採收 XP +${Math.round(value * 100)}%`;
    case 'sellBonus':    return `販售收益 +${Math.round(value * 100)}%`;
    case 'shopDiscount': return `種子費用 -${Math.round(value * 100)}%`;
    case 'extraGrowth':  return `每天多成長 ${value.toFixed(1)} 天`;
    case 'noWither':     return `1天不澆水不會枯死`;
    default:             return buff.label;
  }
}

function applyPetBuff(petId, buff) {
  const lv = getPetLevel(petId);
  if (buff.type === 'noWither') {
    G.activeBuffs.noWither = true;
  } else {
    G.activeBuffs[buff.type] = (G.activeBuffs[buff.type] || 0) + scaledBuffValue(buff, lv);
  }
}

function reapplyBuffs() {
  G.activeBuffs = { xpBonus: 0, sellBonus: 0, shopDiscount: 0, extraGrowth: 0, noWither: false };
  const counted = new Set();

  // Fed daily pets take priority
  G.dailyPets.forEach(pet => {
    if (!pet.fed) return;
    counted.add(pet.id);
    applyPetBuff(pet.id, pet.buff);
    if (pet.buff2) applyPetBuff(pet.id, pet.buff2);
  });

  // Owned pets always provide passive buff (skip if already counted above)
  (G.ownedPets || []).forEach(petId => {
    if (counted.has(petId)) return;
    const pt = PET_TYPES.find(p => p.id === petId);
    if (!pt) return;
    applyPetBuff(petId, pt.buff);
    if (pt.buff2) applyPetBuff(petId, pt.buff2);
  });
}

function upgradeByPetId(petId) {
  const lv = getPetLevel(petId);
  if (lv >= 5) { showToast('✨ 已達最高等級！'); return; }
  const cost = upgradeCost(lv);
  if (G.money < cost) { SFX.error(); showToast('💰 金幣不足！'); return; }
  const pt = PET_TYPES.find(p => p.id === petId);
  G.money -= cost;
  G.petLevels[petId] = lv + 1;
  reapplyBuffs();
  showToast(`${pt?.emoji || ''} ${pt?.name || ''} 升到 Lv.${lv + 1}！`, 2500);
  save();
  renderPetScreen();
  renderAll();
}

function upgradePet(petIdx) {
  const pet = G.dailyPets[petIdx];
  if (!pet || !pet.fed) return;
  upgradeByPetId(pet.id);
}

function adoptPet(petIdx) {
  const pet = G.dailyPets[petIdx];
  if (!pet || !pet.fed) return;
  if (!G.ownedPets) G.ownedPets = [];
  if (G.ownedPets.includes(pet.id)) { showToast(`${pet.emoji} 已經在農場裡了！`); return; }
  if (G.ownedPets.length >= 5) { showToast('🏡 農場最多容納 5 隻寵物，請先放生一隻！', 3000); return; }
  G.ownedPets.push(pet.id);
  reapplyBuffs();
  SFX.adopt();
  showToast(`🐾 ${pet.emoji} ${pet.name} 永久加入了你的農場！`, 3000);
  save();
  renderPetScreen();
  renderAll();
}

function releasePet(petId) {
  if (!G.ownedPets) return;
  const pt = PET_TYPES.find(p => p.id === petId);
  G.ownedPets = G.ownedPets.filter(id => id !== petId);
  if (G.viewingOwnedId === petId) G.viewingOwnedId = null;
  reapplyBuffs();
  showToast(`🌿 ${pt?.emoji || ''} ${pt?.name || ''} 已放生，祝牠一路順風！`, 3000);
  save();
  renderPetScreen();
  renderAll();
}

function generateDailyPets() {
  const shuffled = [...PET_TYPES].sort(() => Math.random() - 0.5);
  G.dailyPets = shuffled.slice(0, 3).map(p => ({ ...p, fed: false, happiness: 0 }));
  reapplyBuffs(); // owned pets keep their passive buffs; daily pets start unfed
}

function openPetScreen() {
  G.feedingPetIdx  = -1;
  G.viewingPetIdx  = -1;
  G.viewingOwnedId = null;
  document.getElementById('pet-screen').hidden = false;
  renderPetScreen();
}

function closePetScreen() {
  G.feedingPetIdx  = -1;
  G.viewingPetIdx  = -1;
  G.viewingOwnedId = null;
  document.getElementById('pet-screen').hidden = true;
}

function renderPetScreen() {
  document.getElementById('pet-screen-day').textContent = G.day;
  const list = document.getElementById('pet-list');
  list.innerHTML = '';

  G.dailyPets.forEach((pet, idx) => {
    const isFeedMode = G.feedingPetIdx === idx;
    const favCrop    = CROPS[pet.favCrop];
    const moodEmoji  = pet.fed ? (pet.happiness >= 3 ? '😍' : '😊') : '😐';

    let feedContent;
    if (pet.fed) {
      const isViewing = G.viewingPetIdx === idx;
      if (isViewing) {
        const lv       = getPetLevel(pet.id);
        const isMax    = lv >= 5;
        const eff      = scaledBuffValue(pet.buff, lv);
        const effLabel = formatBuffLabel(pet.buff, eff);
        const eff2Label = pet.buff2 ? formatBuffLabel(pet.buff2, scaledBuffValue(pet.buff2, lv)) : null;
        const cost     = upgradeCost(lv);
        const isOwned  = (G.ownedPets || []).includes(pet.id);
        feedContent = `
          <div class="pet-fed-label">💕 已餵食</div>
          <div class="pet-stat-panel">
            <div class="pet-stat-lv">⭐ Lv.${lv}</div>
            <div class="pet-stat-buff">${pet.buff.icon} ${effLabel}</div>
            ${eff2Label ? `<div class="pet-stat-buff pet-stat-buff2">${pet.buff2.icon} ${eff2Label}</div>` : ''}
            ${isMax
              ? `<div class="pet-stat-maxlv">✨ 已達最高等級</div>`
              : `<div class="pet-stat-cost">升級費用：${cost} 💰</div>
                 <button class="pet-upgrade-btn" data-act="upgrade" data-pet="${idx}">⬆ 升到 Lv.${lv + 1}</button>`}
            ${isOwned
              ? `<div class="pet-owned-badge">🏡 已收留</div>`
              : `<button class="pet-adopt-btn" data-act="adopt" data-pet="${idx}">🏠 收留牠</button>`}
            <button class="food-cancel-btn" data-act="closeView">關閉</button>
          </div>`;
      } else {
        feedContent = `
          <div class="pet-fed-label">💕 已餵食</div>
          <button class="pet-view-btn" data-act="view" data-pet="${idx}">📊 點即可查看屬性</button>`;
      }
    } else if (isFeedMode) {
      const items = Object.entries(G.inventory);
      if (!items.length) {
        feedContent = `
          <div class="no-food-msg">背包沒有農作物<br>先回農場收穫吧！</div>
          <button class="food-cancel-btn" data-act="cancel">取消</button>`;
      } else {
        const chips = items.map(([cid, cnt]) => {
          const c = CROPS[cid];
          const isFav = cid === pet.favCrop;
          return `<button class="food-chip${isFav ? ' fav-chip' : ''}" data-act="feed" data-pet="${idx}" data-crop="${cid}">${c.emoji} ${c.name}×${cnt}${isFav ? ' ★' : ''}</button>`;
        }).join('');
        feedContent = `
          <div class="food-select-title">選擇要餵的食物</div>
          <div class="food-grid">${chips}</div>
          <button class="food-cancel-btn" data-act="cancel">取消</button>`;
      }
    } else {
      feedContent = `<button class="pet-feed-btn" data-act="open" data-pet="${idx}">🌾 餵食</button>`;
    }

    const petGrade  = pet.grade || 'common';
    const gradeInfo = RARITIES[petGrade];
    const card = document.createElement('div');
    card.className = 'pet-card grade-' + petGrade + (isFeedMode ? ' feeding' : '') + (pet.fed ? ' fed-done' : '');
    card.innerHTML = `
      <span class="rarity-badge pet-grade-badge" style="color:${gradeInfo.badgeColor};background:${gradeInfo.badgeBg}">${gradeInfo.name}</span>
      <span class="pet-emoji-big">${pet.emoji}</span>
      <div class="pet-name">${pet.name}</div>
      <div class="pet-fav-food">喜歡：${favCrop ? favCrop.emoji + ' ' + favCrop.name : '?'}</div>
      <div class="pet-buff-tag${pet.fed ? ' active' : ''}">${pet.buff.icon} ${pet.buff.label}</div>
      ${pet.buff2 ? `<div class="pet-buff-tag pet-buff2-tag${pet.fed ? ' active' : ''}">${pet.buff2.icon} ${pet.buff2.label}</div>` : ''}
      <span class="pet-mood">${moodEmoji}</span>
      ${feedContent}`;
    list.appendChild(card);
  });

  list.onclick = e => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    if      (btn.dataset.act === 'open')      { G.feedingPetIdx = parseInt(btn.dataset.pet); renderPetScreen(); }
    else if (btn.dataset.act === 'cancel')    { G.feedingPetIdx = -1; renderPetScreen(); }
    else if (btn.dataset.act === 'feed')      { feedPet(parseInt(btn.dataset.pet), btn.dataset.crop); }
    else if (btn.dataset.act === 'view')      { G.viewingPetIdx = parseInt(btn.dataset.pet); renderPetScreen(); }
    else if (btn.dataset.act === 'closeView') { G.viewingPetIdx = -1; renderPetScreen(); }
    else if (btn.dataset.act === 'upgrade')   { upgradePet(parseInt(btn.dataset.pet)); }
    else if (btn.dataset.act === 'adopt')     { adoptPet(parseInt(btn.dataset.pet)); }
  };
  renderOwnedPets();
}

function renderOwnedPets() {
  const list   = document.getElementById('pet-owned-list');
  const detail = document.getElementById('pet-owned-detail');
  if (!list) return;

  const owned = G.ownedPets || [];

  if (!owned.length) {
    list.innerHTML = '<div class="owned-empty">餵食寵物後點「收留牠」，牠就會永遠住在這裡 🌿</div>';
    detail.innerHTML = '';
    G.viewingOwnedId = null;
    return;
  }

  list.innerHTML = owned.map(petId => {
    const pt      = PET_TYPES.find(p => p.id === petId);
    if (!pt) return '';
    const lv        = getPetLevel(petId);
    const viewing   = G.viewingOwnedId === petId;
    const og        = pt.grade || 'common';
    const ogInfo    = RARITIES[og];
    return `<div class="owned-pet-card grade-${og}${viewing ? ' viewing' : ''}" data-petid="${petId}">
      <span class="rarity-badge pet-grade-badge" style="color:${ogInfo.badgeColor};background:${ogInfo.badgeBg}">${ogInfo.name}</span>
      <span class="owned-pet-emoji">${pt.emoji}</span>
      <div class="owned-pet-name">${pt.name}</div>
      <div class="owned-pet-lv">⭐ Lv.${lv}</div>
    </div>`;
  }).join('');

  list.onclick = e => {
    const card = e.target.closest('.owned-pet-card');
    if (!card) return;
    const petId = card.dataset.petid;
    G.viewingOwnedId = G.viewingOwnedId === petId ? null : petId;
    renderOwnedPets();
  };

  if (G.viewingOwnedId) {
    const pt = PET_TYPES.find(p => p.id === G.viewingOwnedId);
    if (!pt) { detail.innerHTML = ''; return; }
    const lv       = getPetLevel(G.viewingOwnedId);
    const isMax    = lv >= 5;
    const eff      = scaledBuffValue(pt.buff, lv);
    const effLabel = formatBuffLabel(pt.buff, eff);
    const eff2Label = pt.buff2 ? formatBuffLabel(pt.buff2, scaledBuffValue(pt.buff2, lv)) : null;
    const cost     = upgradeCost(lv);
    const dg     = pt.grade || 'common';
    const dgInfo = RARITIES[dg];
    detail.innerHTML = `
      <div class="owned-detail-inner">
        <span class="owned-detail-emoji">${pt.emoji}</span>
        <div class="owned-detail-info">
          <div class="owned-detail-name">${pt.name} <span class="rarity-badge pet-grade-badge" style="color:${dgInfo.badgeColor};background:${dgInfo.badgeBg}">${dgInfo.name}</span></div>
          <div class="owned-detail-lv">⭐ Lv.${lv}</div>
          <div class="owned-detail-buff">${pt.buff.icon} ${effLabel}</div>
          ${eff2Label ? `<div class="owned-detail-buff">${pt.buff2.icon} ${eff2Label}</div>` : ''}
        </div>
        <div class="owned-detail-actions">
          ${isMax
            ? `<div class="pet-stat-maxlv">✨ 最高等級</div>`
            : `<div class="pet-stat-cost">${cost} 💰</div>
               <button id="owned-upgrade-btn" class="pet-upgrade-btn">⬆ 升到 Lv.${lv + 1}</button>`}
          <button id="owned-release-btn" class="pet-release-btn">🌿 放生</button>
        </div>
      </div>`;
    if (!isMax) {
      document.getElementById('owned-upgrade-btn').onclick = () => upgradeByPetId(G.viewingOwnedId);
    }
    document.getElementById('owned-release-btn').onclick = () => releasePet(G.viewingOwnedId);
  } else {
    detail.innerHTML = '';
  }
}

function feedPet(petIdx, cropId) {
  const pet  = G.dailyPets[petIdx];
  const crop = CROPS[cropId];
  if (!pet || !crop || pet.fed) return;
  if (!G.inventory[cropId]) return;

  G.inventory[cropId]--;
  if (G.inventory[cropId] === 0) delete G.inventory[cropId];

  const isFav     = cropId === pet.favCrop;
  const xpGain    = isFav ? pet.xpBase * 2 : pet.xpBase;
  const moneyGain = isFav ? 15 : 0;

  pet.fed = true;
  pet.happiness = isFav ? 3 : 1;
  G.feedingPetIdx = -1;

  reapplyBuffs();

  gainXP(xpGain);
  G.money += moneyGain;

  SFX.feedPet();
  showToast(
    isFav
      ? `${pet.emoji} ${pet.name} 最愛的食物！ +${xpGain} XP +${moneyGain} 💰  ${pet.buff.icon}${pet.buff.label}`
      : `${pet.emoji} ${pet.name} 吃得很開心！ +${xpGain} XP  ${pet.buff.icon}${pet.buff.label}`,
    3500
  );
  save();
  renderPetScreen();
  renderAll(); // update buff strip + topbar
}

//  EVENTS
// ══════════════════════════════════════════

function handleCell(idx) {
  const plot = G.grid[idx];
  if (!plot) return;

  if (G.mode === 'watering') {
    if (plot.state === 'growing') waterPlot(idx);
    return;
  }

  if (G.mode === 'harvest') {
    if (plot.state === 'ready') harvestPlot(idx);
    return;
  }

  // Normal mode
  if      (plot.state === 'withered')                          clearWithered(idx);
  else if (plot.state === 'ready')                             harvestPlot(idx);
  else if (plot.state === 'empty' && G.selectedSeed)          plantSeed(idx);
  else if (plot.state === 'empty' && !G.selectedSeed)         showToast('請先在商店選擇種子');
}

function bindEvents() {
  // Farm grid — hold + drag interaction
  let isHolding   = false;
  let lastCellIdx = -1;

  const farmGrid = document.getElementById('farm-grid');

  farmGrid.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault(); // prevent text selection while dragging
    const cell = e.target.closest('.plot');
    if (!cell) return;
    isHolding   = true;
    lastCellIdx = parseInt(cell.dataset.idx);
    handleCell(lastCellIdx);
  });

  // mouseover fires when entering child elements too, so deduplicate by idx
  farmGrid.addEventListener('mouseover', e => {
    if (!isHolding) return;
    const cell = e.target.closest('.plot');
    if (!cell) return;
    const idx = parseInt(cell.dataset.idx);
    if (idx === lastCellIdx) return; // same cell, skip
    lastCellIdx = idx;
    handleCell(idx);
  });

  document.addEventListener('mouseup', () => { isHolding = false; });

  // Panel tabs
  document.getElementById('tab-nav').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    if (btn.dataset.tab === 'end') { endDay(); return; }
    if (btn.dataset.tab === 'pet') { openPetScreen(); return; }
    G.activeTab = btn.dataset.tab;
    renderPanel();
  });

  // Bottom bar
  document.getElementById('water-btn').addEventListener('click', () => setMode('watering'));
  document.getElementById('harvest-all-btn').addEventListener('click', harvestAll);
  document.getElementById('harvest-single-btn').addEventListener('click', () => setMode('harvest'));

  // Pet screen
  document.getElementById('pet-btn').addEventListener('click', openPetScreen);
  document.getElementById('pet-back-btn').addEventListener('click', closePetScreen);
  document.getElementById('mute-btn').addEventListener('click', toggleMute);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════

load();
bindEvents();
updateCursor();
renderAll();
document.getElementById('mute-btn').textContent = sfxMuted ? '🔇' : '🔊';

</script>
</body>
</html>
